version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: monitor_redis
    networks:
      - monitor_network

  server:
    build: ./server-python
    container_name: monitor_server
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - monitor_network

  agent:
    build: ./agent-go
    container_name: monitor_agent
    depends_on:
      - server
    environment:
      - SERVER_URL=http://server:5000/report
    networks:
      - monitor_network

networks:
  monitor_network:
    driver: bridge
